name: 🕌 Islamic Bot — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  API_ID: ${{ secrets.API_ID }}
  API_HASH: ${{ secrets.API_HASH }}
  OWNER_ID: ${{ secrets.OWNER_ID }}

jobs:

  # ============================================================
  # JOB 1 — فحص جودة الكود (Lint & Format)
  # ============================================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 pylint black isort

      - name: Black — format check
        run: black --check --diff .

      - name: isort — import order check
        run: isort --check-only --diff .

      - name: Flake8 — style errors
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,.git,__pycache__ \
            --statistics \
            --count

      - name: Pylint — deep code analysis
        run: |
          pylint main.py azan_manager.py azan_prayer_times.py \
            azan_config.py advanced_adhkar_library.py \
            --disable=C0114,C0115,C0116,R0903,W0611 \
            --max-line-length=120 \
            --fail-under=7.0

  # ============================================================
  # JOB 2 — فحص الأمان (Security Scan)
  # ============================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety pip-audit

      - name: Bandit — security vulnerabilities in code
        run: |
          bandit -r . \
            --exclude ./venv,./tests \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r . \
            --exclude ./venv,./tests \
            --severity-level high \
            --confidence-level high

      - name: Safety — known CVEs in dependencies
        run: safety check -r requirements.txt --full-report

      - name: pip-audit — dependency audit
        run: pip-audit -r requirements.txt --format json -o pip-audit.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit.json

      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --exclude-files '\.env\.example' > .secrets.baseline
          python -c "
          import json, sys
          with open('.secrets.baseline') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'❌ Found {total} potential secret(s)!')
              print(json.dumps(results, indent=2))
              sys.exit(1)
          else:
              print('✅ No secrets found in code')
          "

  # ============================================================
  # JOB 3 — الاختبارات الوحدية والتكاملية
  # ============================================================
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout \
                      pytest-mock aioresponses freezegun

      - name: Create test environment
        run: |
          mkdir -p music azan_data logs
          cp .env.example .env
          echo "BOT_TOKEN=test_token_1234567890:ABCDefghijklmnopqrstuvwxyz" >> .env
          echo "API_ID=12345678" >> .env
          echo "API_HASH=abcdef1234567890abcdef1234567890" >> .env
          echo "OWNER_ID=123456789" >> .env

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            --timeout=30 \
            --tb=short \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

  # ============================================================
  # JOB 4 — التحقق من الاستيراد والتشغيل (Smoke Test)
  # ============================================================
  smoke-test:
    name: 💨 Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg
          pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p music azan_data logs

      - name: Smoke test — verify all imports
        run: |
          python -c "
          import sys
          print('🔍 Testing imports...')

          from azan_prayer_times import PrayerTimeCalculator, CityCoordinates
          print('  ✅ azan_prayer_times')

          from azan_manager import (AzanScheduler, AzanStreamer,
                                    AzanNotificationManager, NotificationType,
                                    UserAzanSettings)
          print('  ✅ azan_manager')

          from azan_config import AZAN_SOURCES, PRELUDE_SOURCES
          print('  ✅ azan_config')

          from advanced_adhkar_library import ADVANCED_ADHKAR
          print('  ✅ advanced_adhkar_library')

          print('✅ All imports successful')
          "

      - name: Smoke test — prayer time calculation
        run: |
          python -c "
          from datetime import datetime
          from azan_prayer_times import PrayerTimeCalculator, CityCoordinates

          coords = CityCoordinates.get_city_coords('مكة المكرمة')
          assert coords is not None, 'Makkah coords not found'

          calc = PrayerTimeCalculator(
              latitude=coords['lat'],
              longitude=coords['lng'],
              timezone=3,
              method='makkah'
          )
          times = calc.calculate_times(datetime.now())
          assert isinstance(times, dict), 'calculate_times must return dict'
          assert 'fajr' in times, 'fajr must be in times'
          assert 'maghrib' in times, 'maghrib must be in times'
          assert 'isha' in times, 'isha must be in times'
          print('✅ Prayer time calculation OK')
          print(f'   Fajr: {times[\"fajr\"]}')
          print(f'   Maghrib: {times[\"maghrib\"]}')
          "

      - name: Smoke test — data integrity
        run: |
          python -c "
          from advanced_adhkar_library import ADVANCED_ADHKAR
          from azan_config import AZAN_SOURCES

          assert len(ADVANCED_ADHKAR) > 0, 'ADVANCED_ADHKAR is empty'
          assert len(AZAN_SOURCES) > 0, 'AZAN_SOURCES is empty'

          for source_key, source_data in AZAN_SOURCES.items():
              assert 'name' in source_data, f'Missing name in {source_key}'
              for prayer in ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha']:
                  assert prayer in source_data, f'Missing {prayer} in {source_key}'

          print(f'✅ {len(AZAN_SOURCES)} azan sources verified')
          print(f'✅ {len(ADVANCED_ADHKAR)} adhkar categories verified')
          "

  # ============================================================
  # JOB 5 — البناء والتغليف (Build)
  # ============================================================
  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate required files exist
        run: |
          for f in main.py azan_commands.py azan_manager.py azan_prayer_times.py \
                   azan_config.py advanced_adhkar_library.py requirements.txt .env.example; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done

      - name: Set build metadata
        run: |
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "BUILD_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV
          echo "BUILD_REF=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Generate version file
        run: |
          cat > version.py << EOF
          BUILD_DATE = "${{ env.BUILD_DATE }}"
          BUILD_SHA  = "${{ env.BUILD_SHA }}"
          BUILD_REF  = "${{ env.BUILD_REF }}"
          EOF
          echo "✅ version.py generated"

      - name: Create release archive
        run: |
          zip -r islamic-bot-${{ env.BUILD_SHA }}.zip . \
            -x ".git/*" -x "*.session" -x "__pycache__/*" \
            -x "*.pyc" -x ".env" -x "htmlcov/*" -x "*.log" \
            -x "tests/__pycache__/*"
          echo "📦 Archive: $(du -h islamic-bot-${{ env.BUILD_SHA }}.zip | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: islamic-bot-build-${{ env.BUILD_SHA }}
          path: islamic-bot-${{ env.BUILD_SHA }}.zip
          retention-days: 30

  # ============================================================
  # JOB 6 — النشر التلقائي على السيرفر (Deploy)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://github.com/Alaa91H/islamic-unified-bot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'

            set -e
            BOT_DIR="${{ secrets.DEPLOY_PATH || '/root/islamic-unified-bot' }}"

            echo "📥 Pulling latest code..."
            cd $BOT_DIR
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "🔄 Restarting bot service..."
            sudo systemctl restart islamic-bot

            echo "⏳ Waiting for service to stabilize..."
            sleep 5

            STATUS=$(sudo systemctl is-active islamic-bot)
            if [ "$STATUS" = "active" ]; then
              echo "✅ Bot is running successfully!"
            else
              echo "❌ Bot failed to start!"
              sudo journalctl -u islamic-bot --no-pager -n 50
              exit 1
            fi
          ENDSSH

      - name: Verify deployment health
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} \
              "sudo systemctl status islamic-bot --no-pager"

      - name: Notify on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.OWNER_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ✅ *تم النشر بنجاح!*
            📦 الإصدار: `${{ github.sha }}`
            🌿 الفرع: `${{ github.ref_name }}`
            👤 بواسطة: `${{ github.actor }}`
            🕐 الوقت: `${{ env.BUILD_DATE }}`

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.OWNER_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ❌ *فشل النشر!*
            📦 الإصدار: `${{ github.sha }}`
            🌿 الفرع: `${{ github.ref_name }}`
            🔗 السجل: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
