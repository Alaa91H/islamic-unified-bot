[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 30
log_cli = true
log_cli_level = WARNING
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
